<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coupe du Monde 2026 — Mon Bracket</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--s1:#141416;--s2:#1c1c1f;--s3:#252528;--s4:#2e2e32;
  --bd:rgba(255,255,255,.07);--bdh:rgba(255,255,255,.15);
  --tx:#e2e2e6;--txm:#8a8a92;--txd:#4a4a52;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,.12);--gold-h:#dbbe6a;
  --blue:#4a90d9;--blue-dim:rgba(74,144,217,.1);
  --green:#4caf6e;--green-dim:rgba(76,175,110,.1);
  --red:#d9534a;
  --r:6px;--rl:10px;--tr:140ms ease;
}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;height:52px;background:rgba(12,12,14,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;gap:1rem}
.hdr-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;letter-spacing:.01em;white-space:nowrap}
.hdr-logo span{color:var(--gold);font-weight:400;font-size:13px}
.hdr-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--tr);border:none;outline:none;font-family:inherit}
.btn-ghost{background:transparent;color:var(--txm);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--s2);color:var(--tx);border-color:var(--bdh)}
.btn-gold{background:var(--gold);color:#0c0c0e;font-weight:600}
.btn-gold:hover{background:var(--gold-h)}

/* ── Tabs ── */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 1.5rem;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 16px;font-size:12.5px;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all var(--tr);background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;font-weight:500;letter-spacing:.01em}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Layout ── */
.main{max-width:1480px;margin:0 auto;padding:1.5rem}
.sec{display:none}.sec.on{display:block}

/* ── Progress bar ── */
.pbar{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 18px;margin-bottom:1.2rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pbar-label{font-size:11.5px;color:var(--txm);white-space:nowrap}
.pbar-track{flex:1;height:3px;background:var(--s4);border-radius:2px;min-width:60px;overflow:hidden}
.pbar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s ease}
.pbar-val{font-size:13px;font-weight:600;color:var(--gold);white-space:nowrap}

/* ── Section heading ── */
.sec-head{margin-bottom:1.2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.sec-title{font-size:18px;font-weight:600;letter-spacing:-.01em}
.sec-sub{font-size:12px;color:var(--txm);margin-top:2px}

/* ═══════════════════════════════════════════
   GROUPS
═══════════════════════════════════════════ */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.gc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;transition:border-color var(--tr)}
.gc:hover{border-color:var(--bdh)}
.gc-head{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.gc-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.gc-status{font-size:11px;color:var(--txd)}
.gc-teams{list-style:none}
.gc-team{display:flex;align-items:center;padding:9px 14px;gap:9px;border-bottom:1px solid var(--bd);cursor:default;transition:background var(--tr);position:relative}
.gc-team:last-child{border-bottom:none}
.gc-team:hover{background:var(--s2)}
.gc-rank{width:18px;height:18px;border-radius:50%;background:var(--s3);color:var(--txd);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--tr)}
.gc-flag{font-size:16px;flex-shrink:0}
.gc-name{font-size:12.5px;font-weight:500;flex:1}
.gc-badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.04em;flex-shrink:0}
.badge-1{background:var(--gold-dim);color:var(--gold)}
.badge-2{background:var(--blue-dim);color:var(--blue)}

/* Match score input in group view */
.matches-section{margin-top:1.5rem}
.ms-head{font-size:13px;font-weight:600;margin-bottom:.75rem;color:var(--txm)}
.match-list{display:flex;flex-direction:column;gap:6px}
.match-row{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;gap:0;overflow:hidden;transition:border-color var(--tr)}
.match-row:hover{border-color:var(--bdh)}
.mr-num{font-size:10px;color:var(--txd);width:28px;text-align:center;flex-shrink:0;padding:0 4px}
.mr-team{flex:1;display:flex;align-items:center;gap:6px;padding:8px 10px;min-width:0}
.mr-team.right{flex-direction:row-reverse;text-align:right}
.mr-flag{font-size:14px;flex-shrink:0}
.mr-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mr-score{display:flex;align-items:center;gap:4px;flex-shrink:0;padding:4px 6px}
.score-inp{width:32px;height:28px;background:var(--s3);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:13px;font-weight:600;text-align:center;font-family:inherit;outline:none;transition:border-color var(--tr);-moz-appearance:textfield}
.score-inp:focus{border-color:var(--gold);background:var(--s2)}
.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.score-sep{font-size:12px;color:var(--txd);font-weight:600}
.mr-date{font-size:10px;color:var(--txd);padding:0 8px;flex-shrink:0;white-space:nowrap}

/* Group table view */
.group-section{margin-bottom:1.5rem}
.group-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.group-wrapper{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════
   CLASSEMENT (standings)
═══════════════════════════════════════════ */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:1.5rem}
.standing-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.standing-head{padding:8px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.standing-glabel{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.standing-table{width:100%;border-collapse:collapse}
.standing-table th{font-size:10px;font-weight:600;color:var(--txd);text-align:center;padding:5px 4px;letter-spacing:.04em}
.standing-table th:first-child{text-align:left;padding-left:12px}
.standing-table td{font-size:12px;padding:6px 4px;text-align:center;border-top:1px solid var(--bd)}
.standing-table td:first-child{text-align:left;padding-left:12px}
.standing-table tr.q1 td:first-child{border-left:2px solid var(--gold)}
.standing-table tr.q2 td:first-child{border-left:2px solid var(--blue)}
.standing-table tr.q3{opacity:.7}
.standing-table tr.q3 td:first-child{border-left:2px solid var(--s4)}
.standing-table .pts{font-weight:700;color:var(--tx)}

/* ═══════════════════════════════════════════
   BRACKET
═══════════════════════════════════════════ */
.bracket-container{overflow-x:auto;padding-bottom:1rem}
.bracket{display:flex;gap:0;min-width:max-content;align-items:flex-start}
.br-round{display:flex;flex-direction:column;flex-shrink:0;width:188px}
.br-rhead{text-align:center;padding:0 8px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txm);white-space:nowrap}
.br-matches{display:flex;flex-direction:column}
.br-slot{padding:0 8px;display:flex;flex-direction:column}
.br-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:default;transition:border-color var(--tr)}
.br-card:hover{border-color:var(--bdh)}
.br-team{display:flex;align-items:center;padding:7px 9px;gap:7px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background var(--tr);position:relative}
.br-team:last-child{border-bottom:none}
.br-team:hover:not(.empty){background:var(--s2)}
.br-team.win{background:var(--gold-dim)}
.br-team.win .br-tname{color:var(--gold);font-weight:600}
.br-team.lose{opacity:.35}
.br-team.empty{cursor:default}
.br-flag{font-size:13px;flex-shrink:0}
.br-tname{font-size:11.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color var(--tr)}
.br-tname.ph{color:var(--txd);font-style:italic;font-size:11px}
.br-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;opacity:0;transition:opacity var(--tr)}
.br-team.win .br-dot{opacity:1}
.br-meta{font-size:9.5px;color:var(--txd);text-align:center;padding:2px 0 1px;line-height:1.3}
.br-spacer{flex:1}

/* Champion */
.champ-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 16px;min-width:140px}
.champ-trophy{font-size:32px;margin-bottom:8px}
.champ-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;text-align:center}
.champ-name{font-size:15px;font-weight:700;color:var(--gold);text-align:center;min-height:22px}
.champ-ph{font-size:12px;color:var(--txd);font-style:italic;text-align:center}

/* ═══════════════════════════════════════════
   RESUME
═══════════════════════════════════════════ */
.resume-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:1.2rem;margin-bottom:1rem}
.resume-card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txm);margin-bottom:1rem}
.podium-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.podium-item{text-align:center;padding:14px;background:var(--s2);border-radius:var(--r)}
.podium-medal{font-size:22px;margin-bottom:6px}
.podium-rlabel{font-size:10px;color:var(--txm);margin-bottom:4px}
.podium-flag{font-size:20px}
.podium-team{font-size:13px;font-weight:600;color:var(--gold);margin-top:4px;min-height:20px}
.podium-empty{font-size:12px;color:var(--txd);font-style:italic}
.qualifs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.qualif-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s2);border-radius:var(--r)}
.qualif-grp{font-size:10px;font-weight:700;color:var(--gold);width:22px;flex-shrink:0}
.qualif-teams{font-size:12px;flex:1}

/* ═══════════════════════════════════════════
   Overlays
═══════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease}
.overlay.on{opacity:1;pointer-events:all}
.dialog{background:var(--s2);border:1px solid var(--bdh);border-radius:var(--rl);padding:1.8rem;max-width:320px;width:90%;text-align:center}
.dialog h3{font-size:15px;font-weight:600;margin-bottom:6px}
.dialog p{font-size:12.5px;color:var(--txm);margin-bottom:1.4rem}
.dialog-actions{display:flex;gap:8px;justify-content:center}
.toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--bdh);border-radius:var(--r);padding:9px 14px;font-size:12.5px;z-index:300;opacity:0;transform:translateY(6px);transition:all .2s ease;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}

/* Best thirds info box */
.thirds-info{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:1rem 1.2rem;margin-bottom:1.2rem}
.thirds-info-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txm);margin-bottom:.75rem}
.thirds-grid{display:flex;flex-wrap:wrap;gap:6px}
.third-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--s2);border-radius:20px;font-size:12px}
.third-pos{font-size:10px;font-weight:700;color:var(--txm)}
.third-pts{font-size:10px;color:var(--txd);margin-left:2px}

@media(max-width:600px){.main{padding:1rem}.hdr{padding:0 1rem}.tabs{padding:0 1rem}}
</style>
</head>

// SCORE / STANDING ENGINE
// ═══════════════════════════════════════════════════════════

function teamOf(slot) {
  return GROUPS[slot[0]][parseInt(slot[1])-1];
}

function getScore(no) {
  return ST.scores[no] || {g1:null, g2:null};
}

function hasScore(no) {
  const s=getScore(no); return s.g1!==null && s.g2!==null;
}

function computeStandings(grp) {
  const teams = GROUPS[grp];
  const stats = {};
  teams.forEach(t => stats[t]={pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,mp:0});

  GROUP_MATCHES.filter(m=>m.g===grp).forEach(m=>{
    if(!hasScore(m.no)) return;
    const s=getScore(m.no);
    const t1=teamOf(m.s1), t2=teamOf(m.s2);
    const g1=s.g1, g2=s.g2;
    stats[t1].mp++; stats[t2].mp++;
    stats[t1].gf+=g1; stats[t1].ga+=g2; stats[t1].gd+=g1-g2;
    stats[t2].gf+=g2; stats[t2].ga+=g1; stats[t2].gd+=g2-g1;
    if(g1>g2){ stats[t1].pts+=3; stats[t1].w++; stats[t2].l++; }
    else if(g1===g2){ stats[t1].pts+=1; stats[t1].d++; stats[t2].pts+=1; stats[t2].d++; }
    else{ stats[t2].pts+=3; stats[t2].w++; stats[t1].l++; }
  });

  const arr=teams.map(t=>({name:t,...stats[t]}));
  arr.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
  return arr;
}

function getGroupRanked(grp) {
  // returns [1st, 2nd, 3rd, 4th]
  return computeStandings(grp);
}

function getTeamByPos(grp, pos) {
  // pos=1,2,3,4
  const s=computeStandings(grp);
  return s[pos-1]?.name || null;
}

function getBest8Thirds() {
  // collect all 3rd-placed teams with stats
  const thirds = [];
  Object.keys(GROUPS).forEach(g=>{
    const s=computeStandings(g);
    if(s[2] && s[2].mp>=3) thirds.push({grp:g, ...s[2]});
  });
  thirds.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
  return thirds.slice(0,8);
}

function getThirdFor(slot) {
  // slot like '3CEFHI' — look up which group's 3rd goes there based on which 8 groups qualified
  const best8 = getBest8Thirds();
  if(best8.length < 8) return null;
  const combo = best8.map(t=>t.grp).sort().join('');
  const assign = THIRD_ASSIGN[combo];
  if(!assign) return null;
  const grp = assign[slot];
  if(!grp) return null;
  // find this group in the best8
  const found = best8.find(t=>t.grp===grp);
  return found ? found.name : null;
}

function resolveKOTeam(matchId, side) {
  const def = KO_DEFS[matchId];
  const src = side===1 ? def.s1 : def.s2;

  if(src) {
    // Check if it's a direct slot like '1A', '2B'
    if(/^[12][A-L]$/.test(src)) {
      const pos=parseInt(src[0]), grp=src[1];
      return getTeamByPos(grp,pos);
    }
    // Third-placed slot like '3CEFHI'
    if(src.startsWith('3')) return getThirdFor(src);
  }

  // Feeder match
  const fid = side===1 ? def.f1 : def.f2;
  if(fid) {
    const fdef = KO_DEFS[fid];
    if(fdef && fdef.isLoser) {
      // 3rd place match — loser of semi
      const sfId = side===1 ? fdef.f1 : fdef.f2;
      const sfWin = ST.ko[sfId];
      if(!sfWin) return null;
      const sft1=resolveKOTeam(sfId,1), sft2=resolveKOTeam(sfId,2);
      return sft1===sfWin ? sft2 : sft1;
    }
    return ST.ko[fid] || null;
  }
  return null;
}

function renderGroups() {
  const el=document.getElementById('sec-groupes');
  let html=`<div class="sec-head"><div><div class="sec-title">Phase de groupes</div><div class="sec-sub">Saisissez les scores pour calculer les classements automatiquement</div></div></div>`;

  // Progress
  const done=GROUP_MATCHES.filter(m=>hasScore(m.no)).length;
  const pct=Math.round(done/72*100);
  html+=`<div class="pbar"><span class="pbar-label">Matchs saisis</span><div class="pbar-track"><div class="pbar-fill" style="width:${pct}%"></div></div><span class="pbar-val">${done}/72</span></div>`;

  // Group-by-group: standings card + match list
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(560px,1fr));gap:1.2rem">`;

  Object.entries(GROUPS).forEach(([grp,teams])=>{
    const standings=computeStandings(grp);
    const gmatches=GROUP_MATCHES.filter(m=>m.g===grp);

    html+=`<div>`;
    // Mini standings
    html+=`<div class="gc" style="margin-bottom:8px">
      <div class="gc-head"><span class="gc-label">Groupe ${grp}</span></div>
      <ul class="gc-teams">`;
    standings.forEach((t,i)=>{
      const badge=i===0?`<span class="gc-badge badge-1">1er</span>`:i===1?`<span class="gc-badge badge-2">2e</span>`:'';
      html+=`<li class="gc-team">
        <div class="gc-rank" style="${i<2?`background:var(--${i===0?'gold':'blue'}-dim);color:var(--${i===0?'gold':'blue'})`:''}">${i+1}</div>
        <span class="gc-flag">${FLAGS[t.name]||'🏳️'}</span>
        <span class="gc-name">${t.name}</span>
        <span style="font-size:11px;color:var(--txm);margin-left:auto;padding-right:6px">${t.mp>0?`${t.pts}pts ${t.gf}:${t.ga}`:''}</span>
        ${badge}
      </li>`;
    });
    html+=`</ul></div>`;

    // Match score inputs
    html+=`<div class="match-list">`;
    gmatches.forEach(m=>{
      const t1=teamOf(m.s1), t2=teamOf(m.s2);
      const sc=getScore(m.no);
      html+=`<div class="match-row">
        <span class="mr-num">M${m.no}</span>
        <div class="mr-team">
          <span class="mr-flag">${FLAGS[t1]||'🏳️'}</span>
          <span class="mr-name">${t1}</span>
        </div>
        <div class="mr-score">
          <input class="score-inp" type="number" min="0" max="20" value="${sc.g1??''}" placeholder="–" data-m="${m.no}" data-s="1" oninput="onScore(this)">
          <span class="score-sep">:</span>
          <input class="score-inp" type="number" min="0" max="20" value="${sc.g2??''}" placeholder="–" data-m="${m.no}" data-s="2" oninput="onScore(this)">
        </div>
        <div class="mr-team right">
          <span class="mr-name">${t2}</span>
          <span class="mr-flag">${FLAGS[t2]||'🏳️'}</span>
        </div>
        <span class="mr-date">${m.d}</span>
      </div>`;
    });
    html+=`</div></div>`;
  });

  html+=`</div>`;
  el.innerHTML=html;
}

function onScore(inp) {
  const no=parseInt(inp.dataset.m), side=parseInt(inp.dataset.s);
  const val=inp.value===''?null:Math.max(0,parseInt(inp.value)||0);
  if(!ST.scores[no]) ST.scores[no]={g1:null,g2:null};
  ST.scores[no][side===1?'g1':'g2']=val;
  save();
  // Re-render standings without re-rendering all inputs (to not lose focus)
  refreshStandings();
}

function refreshStandings() {
  // Update the mini standings in-place
  Object.keys(GROUPS).forEach(grp=>{
    const standings=computeStandings(grp);
    // Update rank indicators and badge in group cards
    // Simpler: re-render full groups tab only if it's visible
  });
  if(document.getElementById('sec-classement').classList.contains('on')) renderStandings();
  if(document.getElementById('sec-bracket').classList.contains('on')) renderBracket();
}

// ═══════════════════════════════════════════════════════════
// RENDER: STANDINGS TAB
// ═══════════════════════════════════════════════════════════
function renderStandings() {
  const el=document.getElementById('sec-classement');
  const best8=getBest8Thirds();
  const best8groups=best8.map(t=>t.grp);

  let html=`<div class="sec-head"><div><div class="sec-title">Classements</div><div class="sec-sub">Calculés automatiquement depuis vos scores</div></div></div>`;
  html+=`<div class="standings-grid">`;

  Object.entries(GROUPS).forEach(([grp])=>{
    const s=computeStandings(grp);
    const b8=best8groups.includes(grp);
    html+=`<div class="standing-card">
      <div class="standing-head"><span class="standing-glabel">Groupe ${grp}</span></div>
      <table class="standing-table">
        <thead><tr><th>Équipe</th><th>J</th><th>G</th><th>N</th><th>D</th><th>BP</th><th>BC</th><th>DB</th><th class="pts">Pts</th></tr></thead>
        <tbody>`;
    s.forEach((t,i)=>{
      const cls=i===0?'q1':i===1?'q2':(i===2&&b8)?'q2':'q3';
      html+=`<tr class="${cls}">
        <td><span style="margin-right:5px">${FLAGS[t.name]||'🏳️'}</span>${t.name}</td>
        <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td><td>${t.gd>=0?'+':''}${t.gd}</td>
        <td class="pts">${t.pts}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  html+=`</div>`;

  // Best thirds
  html+=`<div class="thirds-info"><div class="thirds-info-title">8 meilleurs 3es qualifiés pour les 16es</div><div class="thirds-grid">`;
  if(best8.length===0) {
    html+=`<span style="font-size:12px;color:var(--txd)">Entrez les scores de poule pour voir les meilleurs 3es</span>`;
  } else {
    best8.forEach((t,i)=>{
      html+=`<div class="third-pill">
        <span class="third-pos">${i+1}.</span>
        <span>${FLAGS[t.name]||'🏳️'}</span>
        <span style="font-size:12px;font-weight:500">${t.name}</span>
        <span style="font-size:10px;color:var(--gold);font-weight:600">${t.pts}pts</span>
        <span class="third-pts">(Gr.${t.grp})</span>
      </div>`;
    });
  }
  html+=`</div></div>`;
  el.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// RENDER: BRACKET TAB
// ═══════════════════════════════════════════════════════════
function renderBracket() {
  const el=document.getElementById('sec-bracket');
  const allKO=[...KO_ROUNDS.flatMap(r=>r.ids)];
  const done=allKO.filter(id=>ST.ko[id]).length;
  const total=allKO.length; // 16+8+4+2+1=31
  const pct=Math.round(done/total*100);

  let html=`<div class="sec-head"><div><div class="sec-title">Tableau éliminatoire</div><div class="sec-sub">Cliquez sur une équipe pour la qualifier au tour suivant</div></div></div>`;
  html+=`<div class="pbar"><span class="pbar-label">Matchs pronostiqués</span><div class="pbar-track"><div class="pbar-fill" style="width:${pct}%"></div></div><span class="pbar-val">${done}/${total}</span></div>`;
  html+=`<div class="bracket-container"><div class="bracket" id="bracket-inner">`;

  KO_ROUNDS.forEach((round, ri)=>{
    const matchCount=round.ids.length;
    const totalSlots=16;
    const gap=totalSlots/matchCount; // spacing factor
    const itemH=60; // px per match
    const spacerH=(gap-1)*itemH;

    html+=`<div class="br-round"><div class="br-rhead">${round.name}</div><div class="br-matches">`;

    round.ids.forEach((id,mi)=>{
      const def=KO_DEFS[id];
      const t1=resolveKOTeam(id,1);
      const t2=resolveKOTeam(id,2);
      const win=ST.ko[id];

      const t1win=win&&win===t1&&t1;
      const t2win=win&&win===t2&&t2;
      const t1lose=win&&t1&&win!==t1;
      const t2lose=win&&t2&&win!==t2;

      const spacer=mi>0?`style="padding-top:${spacerH}px"`:'';

      html+=`<div class="br-slot" ${spacer}>
        <div class="br-card">
          <div class="br-team ${t1win?'win':''} ${t1lose?'lose':''} ${!t1?'empty':''}" onclick="${t1?`koClick(${id},'${t1.replace(/'/g,"\\'")}')`:'void(0)'}">
            <span class="br-flag">${t1?FLAGS[t1]||'🏳️':'🏳️'}</span>
            <span class="br-tname ${!t1?'ph':''}">${t1||'À déterm.'}</span>
            <span class="br-dot"></span>
          </div>
          <div class="br-team ${t2win?'win':''} ${t2lose?'lose':''} ${!t2?'empty':''}" onclick="${t2?`koClick(${id},'${t2.replace(/'/g,"\\'")}')`:'void(0)'}">
            <span class="br-flag">${t2?FLAGS[t2]||'🏳️':'🏳️'}</span>
            <span class="br-tname ${!t2?'ph':''}">${t2||'À déterm.'}</span>
            <span class="br-dot"></span>
          </div>
        </div>
        <div class="br-meta">M${id} · ${def.d}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  // Champion
  const champ=ST.ko[104];
  html+=`<div class="champ-col">
    <div class="champ-trophy">🏆</div>
    <div class="champ-label">Champion</div>
    ${champ?`<div class="champ-name">${FLAGS[champ]||''} ${champ}</div>`:`<div class="champ-ph">En attente…</div>`}
  </div>`;

  html+=`</div></div>`;
  el.innerHTML=html;
}

function koClick(matchId, team) {
  const cur=ST.ko[matchId];
  if(cur===team) {
    delete ST.ko[matchId];
    cascadeClear(matchId);
  } else {
    if(cur) cascadeClear(matchId);
    ST.ko[matchId]=team;
  }
  save();
  renderBracket();
}

function cascadeClear(matchId) {
  Object.keys(KO_DEFS).forEach(idStr=>{
    const id=parseInt(idStr);
    const def=KO_DEFS[id];
    if(def.f1===matchId||def.f2===matchId) {
      if(ST.ko[id]) { delete ST.ko[id]; cascadeClear(id); }
    }
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER: RESUME
// ═══════════════════════════════════════════════════════════
function renderResume() {
  const el=document.getElementById('sec-resume');
  const champ=ST.ko[104];
  const finalist=(()=>{
    const t1=resolveKOTeam(104,1), t2=resolveKOTeam(104,2);
    if(champ&&t1&&t2) return t1===champ?t2:t1;
    return null;
  })();
  const third=ST.ko[103]||(()=>{
    const t1=resolveKOTeam(103,1), t2=resolveKOTeam(103,2);
    return null;
  })();

  let html=`<div class="sec-head"><div class="sec-title">Mon Pronostic</div></div>`;

  // Podium
  html+=`<div class="resume-card"><div class="resume-card-title">Podium</div><div class="podium-grid">
    ${pod('🥇','Champion',champ)}
    ${pod('🥈','Finaliste',finalist)}
    ${pod('🥉','3e place',ST.ko[103])}
  </div></div>`;

  // Qualified by group
  html+=`<div class="resume-card"><div class="resume-card-title">Qualifiés par groupe</div><div class="qualifs-grid">`;
  Object.keys(GROUPS).forEach(g=>{
    const s=computeStandings(g);
    const q1=s[0]?.mp>=3?s[0]?.name:null;
    const q2=s[1]?.mp>=3?s[1]?.name:null;
    html+=`<div class="qualif-item"><span class="qualif-grp">G.${g}</span><div class="qualif-teams">
      <div>${q1?`${FLAGS[q1]||''} ${q1}`:'<span style="color:var(--txd)">—</span>'}</div>
      <div style="color:var(--txm)">${q2?`${FLAGS[q2]||''} ${q2}`:'<span style="color:var(--txd)">—</span>'}</div>
    </div></div>`;
  });
  html+=`</div></div>`;

  el.innerHTML=html;
}

function pod(medal,lbl,team) {
  return `<div class="podium-item">
    <div class="podium-medal">${medal}</div>
    <div class="podium-rlabel">${lbl}</div>
    ${team?`<div class="podium-flag">${FLAGS[team]||''}</div><div class="podium-team">${team}</div>`:`<div class="podium-flag">—</div><div class="podium-empty">À déterm.</div>`}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// NAV + ACTIONS
// ═══════════════════════════════════════════════════════════
function switchTab(name,btn) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('sec-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='groupes') renderGroups();
  else if(name==='classement') renderStandings();
  else if(name==='bracket') renderBracket();
  else if(name==='resume') renderResume();
}

function doSave(){save();toast('✓ Sauvegardé');}
function exportJSON(){
  const b=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='wc2026.json';a.click();
  toast('⬇ Export téléchargé');
}
function showConfirm(){document.getElementById('confirm-overlay').classList.add('on')}
function hideConfirm(){document.getElementById('confirm-overlay').classList.remove('on')}
function doReset(){ST={scores:{},ko:{}};save();hideConfirm();renderGroups();toast('↺ Réinitialisé')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200)}

load();
renderGroups();
</script>
