<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coupe du Monde 2026 — Mon Bracket</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">⚽ Coupe du Monde <span>2026</span></div>
  <div class="hdr-next" id="hdr-next"></div>
  <div class="hdr-actions">
    <button class="btn btn-icon" id="theme-btn" onclick="toggleTheme()" title="Changer le thème">☀</button>
    <button class="btn btn-ghost" onclick="showConfirm()">↺ Reset</button>
    <button class="btn btn-ghost" onclick="exportJSON()">⬇ Export</button>
    <button class="btn btn-gold" onclick="doSave()">✓ Sauvegarder</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab on" onclick="switchTab('groupes',this)">Groupes &amp; Scores</button>
  <button class="tab" onclick="switchTab('classement',this)">Classements</button>
  <button class="tab" onclick="switchTab('bracket',this)">Tableau éliminatoire</button>
  <button class="tab" onclick="switchTab('resume',this)">Résumé</button>
</nav>

<main class="main">
  <div id="sec-groupes" class="sec on"></div>
  <div id="sec-classement" class="sec"></div>
  <div id="sec-bracket" class="sec"></div>
  <div id="sec-resume" class="sec"></div>
</main>

<div class="overlay" id="confirm-overlay">
  <div class="dialog">
    <h3>Réinitialiser ?</h3>
    <p>Tous les scores et pronostics seront effacés.</p>
    <div class="dialog-actions">
      <button class="btn btn-ghost" onclick="hideConfirm()">Annuler</button>
      <button class="btn" style="background:#c0392b;color:#fff;font-weight:600" onclick="doReset()">Réinitialiser</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
